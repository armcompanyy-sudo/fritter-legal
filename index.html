<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fritter — Legal</title>
<style>
  :root { --bg:#0E0D0B; --text:#F2EFE9; --muted:#A19A8C; --accent:#FFB020; --line:#2A2721; --surface:#171512; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); padding:0 20px;
    font:17px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  .wrap { max-width:520px; margin:0 auto; padding:80px 0; }
  .brand { display:inline-flex; align-items:center; gap:10px; font-weight:700; letter-spacing:.5px; margin-bottom:36px; }
  .mark { width:30px; height:30px; display:block; }
  h1 { font-size:26px; margin:0 0 24px; }
  a.link { display:block; background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:18px 20px; margin:12px 0; color:var(--text); text-decoration:none; font-weight:600; }
  a.link:hover { border-color:var(--accent); }
  a.link span { display:block; color:var(--muted); font-weight:400; font-size:14px; margin-top:2px; }
  .foot { color:var(--muted); font-size:14px; margin-top:36px; }
  .foot a { color:var(--accent); }
</style>
</head>
<body>
  <div class="wrap">
    <span class="brand"><svg class="mark" viewBox="0 0 30 30" aria-hidden="true"><circle cx="15" cy="15" r="9.27" fill="none" stroke="#FFB020" stroke-width="2.05" stroke-linecap="round" stroke-dasharray="46.5 11.75" transform="rotate(88.25 15 15)"/><circle cx="20.29" cy="21.77" r="1.3" fill="#FFB020"/><circle cx="22.39" cy="24.46" r="0.82" fill="#FFB020"/><circle cx="23.99" cy="26.49" r="0.49" fill="#FFB020"/></svg> Fritter</span>
    <h1>Legal</h1>
    <a class="link" href="/privacy">Privacy Policy <span>How Fritter handles your data</span></a>
    <a class="link" href="/terms">Terms of Use <span>The agreement for using Fritter</span></a>
    <p class="foot">Questions? <a href="mailto:support@getfritter.com">support@getfritter.com</a></p>
  </div>
</body>
</html>
